server {
    listen 3101;

    root /usr/share/nginx/html;
    index index.html;

    add_header Access-Control-Allow-Private-Network "true" always;

    # Serve the React SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api requests to the backend server.
    # With network_mode: host in docker-compose, both containers share the
    # host network, so localhost:3001 reaches the server container directly.
    location /api {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Private-Network "true";
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "*";
            return 204;
        }
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
